<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>💳 Payment System</h1>

        <!-- DEPOSIT -->
        <div class="card">
            <h2>Request Payment (User Pays You)</h2>
            <input id="dep-phone" placeholder="Phone (2507...)" />
            <input id="dep-amount" placeholder="Amount" />
            <button onclick="createDeposit()">Request Deposit</button>
            <p id="dep-result"></p>
        </div>

        <!-- PAYOUT -->
        <div class="card">
            <h2>Send Money (Payout)</h2>
            <input id="userId" placeholder="User ID" />
            <input id="pay-amount" placeholder="Amount" />
            <button onclick="sendPayout()">Send Payout</button>
            <p id="pay-result"></p>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
